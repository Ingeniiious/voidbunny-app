# Panel tmux config. Loaded via `tmux -L panel -f <this file>` from the
# Node backend; lives on its own socket so it doesn't collide with any
# tmux sessions the user runs by hand.

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g mouse on
set -g history-limit 50000
set -g status off
set -g escape-time 10

# When multiple clients attach to the same session (e.g. phone + laptop),
# resize the window to the *active* client's size instead of forcing
# everyone to the smallest.
set-window-option -g aggressive-resize on

# Keep sessions alive after their initial command exits — the shell is the
# command, and if it exits we want the tmux session to die naturally.
set -g remain-on-exit off
